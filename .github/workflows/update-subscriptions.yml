name: Update subscriptions

on:
  workflow_dispatch:
  schedule:
    - cron: '*/45 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update subscription files
        run: node scripts/update-subscriptions.js

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add full_ips.txt best_ips.txt
          if git diff --cached --quiet; then
            echo "No subscription changes."
            exit 0
          fi
          git commit -m "Update filtered subscription files"
          git push
